<!DOCTYPE html>

<html lang="zh-Hant-HK">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>宇宙探險家：地球奧秘大挑戰！</title>

    <style>

        /* CSS 樣式：設計可愛、色調溫暖的介面 */

        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei", "微軟正黑體";

            background-color: #e6f7ff;

            color: #333;

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            margin: 0;

            overflow-x: hidden;

        }



        #game-container {

            background-color: #ffffff;

            width: 90%;

            max-width: 800px;

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0 10px 25px rgba(0,0,0,0.1);

            text-align: center;

            position: relative;

        }



        h1 {

            color: #4a90e2;

            font-size: 2.5em;

            margin-bottom: 30px;

        }



        .screen { display: none; }

        .active { display: block; }



        input[type="text"] {

            font-size: 1.2em;

            padding: 15px;

            border: 2px solid #ddd;

            border-radius: 10px;

            width: 70%;

            max-width: 300px;

            margin-bottom: 20px;

        }



        button {

            font-size: 1.2em;

            padding: 15px 30px;

            background-color: #f5a623;

            color: white;

            border: none;

            border-radius: 10px;

            cursor: pointer;

            transition: background-color 0.3s ease;

        }



        button:hover { background-color: #e0961a; }



        #quiz-image {

            max-width: 100%;

            height: auto;

            max-height: 250px;

            border-radius: 15px;

            margin-bottom: 20px;

        }



        #question-text {

            font-size: 1.5em;

            font-weight: bold;

            margin-bottom: 20px;

        }



        #options-container {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 15px;

        }



        .option-btn {

            background-color: #ffffff;

            color: #333;

            border: 2px solid #ddd;

            font-size: 1.1em;

            padding: 15px;

            text-align: left;

        }



        .option-btn:hover {

            background-color: #f0f8ff;

            border-color: #4a90e2;

        }



        #hud {

            display: flex;

            justify-content: space-between;

            margin-bottom: 20px;

            font-size: 1.1em;

            color: #666;

        }



        #leaderboard {

            width: 80%;

            margin: 20px auto;

            border-collapse: collapse;

        }



        #leaderboard th, #leaderboard td {

            border: 1px solid #ddd;

            padding: 12px;

            text-align: center;

        }



        #leaderboard th {

            background-color: #f2f2f2;

            color: #4a90e2;

        }

    </style>

</head>

<body>



    <div id="game-container">

        <div id="start-screen" class="screen active">

            <h1>各位小小宇宙探險家<br>歡迎來到「地球奧秘大挑戰」！🚀</h1>

            <p>喺出發去太空之前，請先登記你嘅探險家身分！</p>

            <input type="text" id="student-name-input" placeholder="請輸入你的真實姓名..." maxlength="10">

            <br>

            <button onclick="startGame()">開始探險 🌍</button>

        </div>



        <div id="quiz-screen" class="screen">

            <div id="hud">

                <div>探險家：<span id="player-name-display"></span></div>

                <div>時間：<span id="timer-display">0</span>s</div>

                <div>分數：<span id="score-display">0</span> / 5</div>

            </div>

            <img id="quiz-image" src="" alt="地球卡通圖">

            <p id="question-text"></p>

            <div id="options-container"></div>

        </div>



        <div id="results-screen" class="screen">

            <h1 id="final-status">探險完成！🏆</h1>

            <p>你的最終分數是：<span id="final-score"></span> / 5</p>

            <p>你用了 <span id="final-time"></span> 秒完成！</p>

            

            <hr>

            <h3>🏆 全班榮譽排行榜 (Top 3) 🏆</h3>

            <table id="leaderboard">

                <thead>

                    <tr>

                        <th>排名</th>

                        <th>探險家</th>

                        <th>分數</th>

                        <th>時間</th>

                    </tr>

                </thead>

                <tbody id="leaderboard-body">

                    </tbody>

            </table>

            <br>

            <button onclick="resetGame()">再挑戰一次</button>

        </div>

    </div>



    <script>

        // 🚨 超級重要：請將下面引號內嘅網址，替換成你嘅 Google Apps Script Web App URL！

        const GOOGLE_SCRIPT_URL = "YOUR_WEB_APP_URL_HERE";



        const questionsData = [

            {

                question: "1. 點解地球上會有白天同黑夜嘅交替呢？☀️🌙",

                image: "https://i.ibb.co/3sXw6L8/earth-rotation.png",

                options: ["因為地球圍繞太陽公轉", "因為地球每天繞着貫穿南北兩極嘅假想地軸自轉", "因為太陽每 24 小時會熄滅一次", "因為月亮擋住咗太陽光"],

                answer: 1

            },

            {

                question: "2. 為何地球上不同地區，白天和黑夜出現的時間並不相同？⏰",

                image: "https://i.ibb.co/f49b16B/earth-timezones.png",

                options: ["因為各國的時鐘設計不同", "因為不同地區的人喜歡不同的起床時間", "因為地球轉得太快，時鐘壞了", "因為不同地區在不同時間受到太陽光照射"],

                answer: 3

            },

            {

                question: "3. 地球圍繞太陽「公轉」一周，大約需要幾耐時間？🚀",

                image: "https://i.ibb.co/fD27bM8/earth-orbit.png",

                options: ["三百六十五日 (即是一年)", "二十四小時", "一個月", "一百年"],

                answer: 0

            },

            {

                question: "4. 地軸是傾斜的，當太陽光「直射」北半球時，光線集中，請問北半球係咩季節？🔥",

                image: "https://i.ibb.co/7X7k908/north-summer.png",

                options: ["冬季", "春季", "夏季", "秋季"],

                answer: 2

            },

            {

                question: "5. 當太陽光斜射北半球，並同時直射南半球時，南半球是什麼季節？⛄",

                image: "https://i.ibb.co/TqqS6F8/south-summer.png",

                options: ["春季", "夏季", "秋季", "冬季"],

                answer: 1

            }

        ];



        let currentQuestion = 0;

        let score = 0;

        let playerName = "";

        let startTime, timerInterval;



        const startScreen = document.getElementById('start-screen');

        const quizScreen = document.getElementById('quiz-screen');

        const resultsScreen = document.getElementById('results-screen');

        const leaderboardBody = document.getElementById('leaderboard-body');



        function startGame() {

            playerName = document.getElementById('student-name-input').value.trim();

            if (playerName === "") {

                alert("探險家，請先輸入你嘅姓名啊！");

                return;

            }

            document.getElementById('player-name-display').textContent = playerName;

            startScreen.classList.remove('active');

            quizScreen.classList.add('active');

            startTimer();

            loadQuestion();

        }



        function loadQuestion() {

            if (currentQuestion >= questionsData.length) {

                endQuiz();

                return;

            }

            const data = questionsData[currentQuestion];

            document.getElementById('quiz-image').src = data.image;

            document.getElementById('question-text').textContent = data.question;

            const optionsContainer = document.getElementById('options-container');

            optionsContainer.innerHTML = "";

            data.options.forEach((option, index) => {

                const button = document.createElement('button');

                button.textContent = option;

                button.className = 'option-btn';

                button.onclick = () => selectAnswer(index);

                optionsContainer.appendChild(button);

            });

        }



        function selectAnswer(selectedIndex) {

            if (selectedIndex === questionsData[currentQuestion].answer) {

                score++;

                document.getElementById('score-display').textContent = score;

            }

            currentQuestion++;

            loadQuestion();

        }



        function startTimer() {

            startTime = Date.now();

            timerInterval = setInterval(() => {

                document.getElementById('timer-display').textContent = Math.floor((Date.now() - startTime) / 1000);

            }, 1000);

        }



        function endQuiz() {

            clearInterval(timerInterval);

            const finalElapsedTime = Math.floor((Date.now() - startTime) / 1000);

            quizScreen.classList.remove('active');

            resultsScreen.classList.add('active');

            document.getElementById('final-score').textContent = score;

            document.getElementById('final-time').textContent = finalElapsedTime;

            

            updateLeaderboard(playerName, score, finalElapsedTime);

        }



        function resetGame() {

            currentQuestion = 0;

            score = 0;

            document.getElementById('score-display').textContent = "0";

            resultsScreen.classList.remove('active');

            startScreen.classList.add('active');

            document.getElementById('student-name-input').value = "";

        }



        // 雲端排行榜連線功能

        function updateLeaderboard(name, finalScore, time) {

            leaderboardBody.innerHTML = "<tr><td colspan='4'>正在努力將成績傳送到太空基地... 🚀<br>(請稍候幾秒鐘)</td></tr>";

            

            // 檢查老師有冇忘記換 URL

            if (GOOGLE_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbzI5jhgR8a_tVwr_Lf2AIveJ5cqKPRaobtbAGCJqQr4CsAWpdW775cdlnvgXmr9_XjVgg/exec") {

                leaderboardBody.innerHTML = "<tr><td colspan='4' style='color:red;'>⚠️ 老師請注意：你尚未在程式碼中貼上 Google Apps Script 的網址！</td></tr>";

                return;

            }



            // 組合要傳送的網址與資料 (使用 GET 請求傳遞參數)

            const urlWithData = `${GOOGLE_SCRIPT_URL}?action=save&name=${encodeURIComponent(name)}&score=${finalScore}&time=${time}`;



            // 發送請求到 Google Sheets

            fetch(urlWithData)

                .then(response => response.json())

                .then(data => {

                    leaderboardBody.innerHTML = "";

                    const medals = ["🥇 冠軍", "🥈 亞軍", "🥉 季軍"];

                    

                    if (data.length === 0) {

                        leaderboardBody.innerHTML = "<tr><td colspan='4'>暫時未有探險家完成任務！</td></tr>";

                        return;

                    }



                    data.forEach((entry, index) => {

                        const row = `<tr>

                            <td>${medals[index] || (index + 1)}</td>

                            <td>${entry.name}</td>

                            <td>${entry.score}</td>

                            <td>${entry.time}s</td>

                        </tr>`;

                        leaderboardBody.innerHTML += row;

                    });

                })

                .catch(error => {

                    console.error('Error:', error);

                    leaderboardBody.innerHTML = "<tr><td colspan='4'>哎呀！太空通訊中斷，無法載入排行榜。📡</td></tr>";

                });

        }

    </script>

</body>

</html>
